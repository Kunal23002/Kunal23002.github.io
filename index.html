    <!-- GSAP -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            requestIdleCallback ? requestIdleCallback(init) : setTimeout(init, 100);
        });

        // Remove Spline watermark from shadow DOM once viewer loads
        (function() {
            const viewer = document.querySelector('.hero-spline-bg');
            if (!viewer) return;
            const strip = () => {
                const root = viewer.shadowRoot;
                if (!root) return;
                ['#logo','[id*="logo"]','[class*="logo"]','[id*="watermark"]','a[href*="spline"]']
                    .forEach(sel => root.querySelectorAll(sel).forEach(el => el.remove()));
            };
            viewer.addEventListener('load', strip);
            // Fallback: poll briefly in case the event already fired
            let attempts = 0;
            const poll = setInterval(() => { strip(); if (++attempts > 20) clearInterval(poll); }, 300);
        })();

        function init() {
            // Theme
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'light') body.classList.add('light-theme');
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('light-theme');
                localStorage.setItem('theme', body.classList.contains('light-theme') ? 'light' : 'dark');
            });


            // Resume dropdown
            const resumeDropdownBtn = document.getElementById('resumeDropdownBtn');
            if (resumeDropdownBtn) {
                const resumeDropdown = resumeDropdownBtn.closest('.resume-dropdown');
                resumeDropdownBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); resumeDropdown.classList.toggle('active'); });
                document.addEventListener('click', (e) => { if (!resumeDropdown.contains(e.target)) resumeDropdown.classList.remove('active'); });
                document.querySelectorAll('.resume-option').forEach(opt => opt.addEventListener('click', () => resumeDropdown.classList.remove('active')));
            }

            // GSAP
            gsap.registerPlugin(ScrollTrigger);

            // Social links spin in
            gsap.from('.social-links .social-link', {
                scrollTrigger: { trigger: '.social-links', start: 'top 85%' },
                y: 40, opacity: 0, scale: 0, rotation: 360, stagger: 0.08, duration: 0.7, ease: 'back.out(2.5)',
            });

            // Section lines animation
            document.querySelectorAll('.section-header').forEach(header => {
                ScrollTrigger.create({
                    trigger: header,
                    start: 'top 80%',
                    end: 'bottom 20%',
                    onEnter: () => { header.classList.remove('animate-lines-reverse'); void header.offsetWidth; header.classList.add('animate-lines'); },
                    onLeave: () => header.classList.remove('animate-lines'),
                    onEnterBack: () => { header.classList.remove('animate-lines'); void header.offsetWidth; header.classList.add('animate-lines-reverse'); },
                    onLeaveBack: () => header.classList.remove('animate-lines-reverse'),
                });
            });
        }
    </script>
